version: "3.9"

services:
  aitri-graph:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: aitri-graph:artifact-cards
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp
