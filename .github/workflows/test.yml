name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Start server
        run: node server.js &
        env:
          PORT: 3000

      - name: Wait for server
        run: for i in {1..15}; do curl -sf http://localhost:3000 && break || sleep 1; done

      - name: Run unit & integration tests
        run: node --test tests/server.test.js tests/config.test.js tests/normalizer.test.js
        env:
          PORT: 3000
