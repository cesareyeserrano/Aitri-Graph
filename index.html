<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aitri — Artifact Visualizer</title>

  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/tree.css" />
  <link rel="stylesheet" href="css/detail.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
<div id="app">

  <!-- ── Sidebar ── -->
  <nav id="sidebar" aria-label="Projects">

    <!-- Projects section -->
    <div id="sidebar-header">
      <h1>Projects</h1>
    </div>
    <div id="project-list" role="list" aria-label="Project list"></div>
    <div id="sidebar-empty" style="display:none">
      No projects yet.<br/>Add one below.
    </div>

    <!-- Artifact tree section -->
    <div id="tree-section">
      <div id="tree-section-header">
        <span>Artifacts</span>
        <div id="status-legend" data-testid="status-legend" class="hidden" aria-label="Status legend">
          <span class="legend-item" title="pending"><span class="legend-dot" style="background:#94A3B8"></span></span>
          <span class="legend-item" title="in progress"><span class="legend-dot" style="background:#60A5FA"></span></span>
          <span class="legend-item" title="approved"><span class="legend-dot" style="background:#34D399"></span></span>
          <span class="legend-item" title="complete"><span class="legend-dot" style="background:#A78BFA"></span></span>
          <span class="legend-item" title="drift"><span class="legend-dot" style="background:#FB923C"></span></span>
        </div>
      </div>
      <div id="tree" aria-label="Artifact tree" role="region"></div>
    </div>

    <!-- Add project -->
    <div id="add-project-section">
      <button id="add-project-btn" aria-label="Add project">+ Add Project</button>
      <form id="add-project-form" novalidate onsubmit="return false">
        <input
          id="project-input"
          type="text"
          placeholder="GitHub URL or /local/path"
          autocomplete="off"
          spellcheck="false"
          aria-label="Project URL or path"
          aria-describedby="form-validation-error"
        />
        <div class="input-hints">
          GitHub: https://github.com/owner/repo<br/>
          Local:&nbsp; /Users/you/project
        </div>
        <div id="form-validation-error" data-testid="form-validation-error" role="alert"></div>
        <div class="form-actions">
          <button id="load-btn" type="button">Load</button>
          <button id="cancel-btn" type="button">Cancel</button>
        </div>
      </form>
      <button id="demo-btn" title="Load built-in demo project">Load Demo Project</button>
    </div>
  </nav>

  <!-- ── Detail Panel ── -->
  <main id="canvas-area" aria-label="Artifact detail">

    <!-- Mobile sidebar toggle -->
    <button id="mobile-toggle" class="ctrl-btn" aria-label="Toggle sidebar" title="Toggle sidebar">☰</button>

    <!-- Empty state -->
    <div id="canvas-empty" class="canvas-state" data-testid="canvas-empty" aria-live="polite">
      <svg class="empty-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="8" y="8" width="48" height="8" rx="2"/>
        <rect x="8" y="22" width="32" height="6" rx="2"/>
        <rect x="8" y="34" width="40" height="6" rx="2"/>
        <rect x="8" y="46" width="24" height="6" rx="2"/>
      </svg>
      <div class="empty-title">Select an artifact</div>
      <div class="empty-sub">Click any item in the tree to read its full details</div>
    </div>

    <!-- Loading state -->
    <div id="canvas-loading" class="canvas-state hidden" data-testid="canvas-loading" aria-live="polite">
      <div class="spinner"></div>
      <div class="loading-text">Loading…</div>
    </div>

    <!-- Error state -->
    <div id="canvas-error" class="canvas-state hidden" data-testid="canvas-error" aria-live="assertive">
      <div class="error-icon">⚠</div>
      <div class="error-title">Could not load project</div>
      <div class="error-desc"></div>
      <button class="retry-btn">Try again</button>
    </div>

    <!-- Artifact detail panel -->
    <div id="detail-panel" class="hidden"></div>

    <!-- Kept for e2e test compat -->
    <div id="graph-controls" role="toolbar" aria-label="Tree navigation" style="display:none">
      <button id="fit-button" class="ctrl-btn" data-testid="fit-button" title="Scroll to top" disabled>⤒</button>
    </div>
    <div id="node-tooltip" data-testid="node-tooltip" role="tooltip" aria-live="polite"></div>

  </main>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
